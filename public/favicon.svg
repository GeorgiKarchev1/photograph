<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Aperture blades -->
  <g transform="translate(32,32)">
    <!-- Blade 1 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(0)"/>
    <!-- Blade 2 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(60)"/>
    <!-- Blade 3 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(120)"/>
    <!-- Blade 4 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(180)"/>
    <!-- Blade 5 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(240)"/>
    <!-- Blade 6 -->
    <path d="M0,-18 L5,-4 L-5,-4 Z" fill="#e8e0d0" opacity="0.95" transform="rotate(300)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="20" stroke="#c8b89a" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Inner dark circle (lens opening) -->
    <circle cx="0" cy="0" r="7" fill="#0a0a0a"/>
    <!-- Inner ring highlight -->
    <circle cx="0" cy="0" r="7" stroke="#c8b89a" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#c8b89a" opacity="0.8"/>
  </g>
</svg>
